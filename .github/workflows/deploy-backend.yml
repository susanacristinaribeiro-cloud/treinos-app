name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/144880670231/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@project-70b0de14-599a-4d70-95b.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy treinos-api \
            --source ./backend \
            --region europe-west1 \
            --allow-unauthenticated \
            --project project-70b0de14-599a-4d70-95b
